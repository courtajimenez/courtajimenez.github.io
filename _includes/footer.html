<footer class="site-footer">
  <div class="social-icons">
    <a href="https://github.com/{{ site.username }}" aria-label="GitHub" target="_blank" rel="noopener">
      <i class="fa fa-github"></i>
    </a>
    <a href="https://www.linkedin.com/in/{{ site.username }}" aria-label="LinkedIn" target="_blank" rel="noopener">
      <i class="fa fa-linkedin"></i>
    </a>
    <a href="https://twitter.com/{{ site.username }}" aria-label="Twitter/X" target="_blank" rel="noopener">
      <i class="fa fa-twitter"></i>
    </a>
    <a href="mailto:{{ site.email }}" aria-label="Email">
      <i class="fa fa-envelope"></i>
    </a>
  </div>
</footer>
