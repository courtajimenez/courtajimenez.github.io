<footer class="site-footer">
  <div class="social-icons">
    <a href="https://github.com/{{ username }}" aria-label="GitHub" target="_blank" rel="noopener">
      <i class="fa-brands fa-github"></i>
    </a>
    <a href="https://www.linkedin.com/in/{{ username }}" aria-label="LinkedIn" target="_blank" rel="noopener">
      <i class="fa-brands fa-linkedin"></i>
    </a>
    <a href="https://twitter.com/{{ username }}" aria-label="Twitter/X" target="_blank" rel="noopener">
      <i class="fa-brands fa-x-twitter"></i>
    </a>
    <a href="mailto:{{ email }}" aria-label="Email">
      <i class="fa-solid fa-envelope"></i>
    </a>
  </div>
</footer>
